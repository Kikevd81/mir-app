name: MIR Scraper

on:
  push:
    branches:
      - main
  schedule:
    # Ejecutar cada 5 minutos (durante todo el día, puedes ajustarlo)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install dependencies
      working-directory: ./scraper
      run: npm install
      
    - name: Run scraper
      working-directory: ./scraper
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        if [ -z "$VITE_SUPABASE_URL" ]; then
          echo "❌ ERROR CRÍTICO: No se han configurado los Secrets en GitHub."
          echo "Por favor, ve a Settings -> Secrets and variables -> Actions y añade VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY y VITE_SUPABASE_SERVICE_ROLE_KEY"
          exit 1
        fi
        node index.js
